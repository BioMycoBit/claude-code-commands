  <text x="30" y="120" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#4ec9b0">&#x2713;</text>
  <text x="48" y="120" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c8c8c8">Attempt 1/5 returns 401 &#x2014; status=401</text>

  <text x="30" y="140" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#4ec9b0">&#x2713;</text>
  <text x="48" y="140" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c8c8c8">Attempt 2/5 returns 401 &#x2014; status=401</text>

  <text x="30" y="160" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#4ec9b0">&#x2713;</text>
  <text x="48" y="160" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c8c8c8">Attempt 3/5 returns 401 &#x2014; status=401</text>

  <text x="30" y="180" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#4ec9b0">&#x2713;</text>
  <text x="48" y="180" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c8c8c8">Attempt 4/5 returns 401 &#x2014; status=401</text>

  <text x="30" y="200" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#4ec9b0">&#x2713;</text>
  <text x="48" y="200" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c8c8c8">Attempt 5/5 returns 401 &#x2014; status=401</text>

  <text x="30" y="220" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#4ec9b0">&#x2713;</text>
  <text x="48" y="220" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#c8c8c8">6th attempt returns 429 &#x2014; status=429</text>

  <text x="30" y="240" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#4ec9b0">&#x2713;</text>
