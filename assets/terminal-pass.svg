<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 370" width="620" height="370">
  <rect width="620" height="370" rx="10" fill="#1a1a1a"/>

  <!-- Terminal title bar -->
  <rect x="0" y="0" width="620" height="32" rx="10" fill="#2d2d2d"/>
  <rect x="0" y="16" width="620" height="16" fill="#2d2d2d"/>
  <circle cx="18" cy="14" r="5.5" fill="#ff5f57"/>
  <circle cx="36" cy="14" r="5.5" fill="#febc2e"/>
  <circle cx="54" cy="14" r="5.5" fill="#28c840"/>
  <text x="310" y="19" text-anchor="middle" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" fill="#999">Terminal</text>

