<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" width="720" height="140">
  <rect width="720" height="140" rx="12" fill="#1a1a2e"/>

  <!-- /audit-suite box -->
  <rect x="40" y="40" width="170" height="56" rx="8" fill="#1b4332" stroke="#40916c" stroke-width="1.5"/>
  <text x="125" y="64" text-anchor="middle" font-family="'SF Mono',Consolas,monospace" font-size="14" font-weight="700" fill="#95d5b2">/audit-suite</text>
  <text x="125" y="83" text-anchor="middle" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" fill="#74c69d">Runs 5 audits in parallel</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="68" x2="258" y2="68" stroke="#40916c" stroke-width="2"/>
  <polygon points="258,63 270,68 258,73" fill="#40916c"/>

  <!-- /sprint-from-findings box -->
  <rect x="270" y="40" width="210" height="56" rx="8" fill="#3a0ca3" stroke="#7b2cbf" stroke-width="1.5"/>
  <text x="375" y="64" text-anchor="middle" font-family="'SF Mono',Consolas,monospace" font-size="13" font-weight="700" fill="#c77dff">/sprint-from-findings</text>
  <text x="375" y="83" text-anchor="middle" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" fill="#b185db">Extracts top findings</text>

  <!-- Arrow 2 -->
  <line x1="480" y1="68" x2="528" y2="68" stroke="#7b2cbf" stroke-width="2"/>
  <polygon points="528,63 540,68 528,73" fill="#7b2cbf"/>

  <!-- /sprint (remediation) box -->
  <rect x="540" y="40" width="140" height="56" rx="8" fill="#2d6a4f" stroke="#52b788" stroke-width="1.5"/>
  <text x="610" y="64" text-anchor="middle" font-family="'SF Mono',Consolas,monospace" font-size="14" font-weight="700" fill="#b7e4c7">/sprint</text>
  <text x="610" y="83" text-anchor="middle" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" fill="#95d5b2">Remediation sprint</text>

  <!-- Subtitle -->
  <text x="360" y="125" text-anchor="middle" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-style="italic" fill="#6c6c8a">Audits run independently — findings feed back into the sprint cycle</text>
</svg>
